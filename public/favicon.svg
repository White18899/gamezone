<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Sleek Neon Cyan to Purple Gradient -->
    <linearGradient id="logo-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c2ff" />
      <stop offset="100%" stop-color="#8900ff" />
    </linearGradient>
    <!-- Drop Shadow Filter for Neon Glow Effect -->
    <filter id="glow-effect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer sci-fi hollow hexagon frame -->
  <polygon points="50,10 85,30 85,70 50,90 15,70 15,30" 
           stroke="url(#logo-glow)" 
           strokeWidth="2.5" 
           strokeDasharray="4 4" 
           opacity="0.3" />

  <!-- Inner stylized wireframe V-node -->
  <path d="M 30,30 L 50,70 L 70,30" 
        stroke="url(#logo-glow)" 
        strokeWidth="6.5" 
        strokeLinecap="round" 
        strokeLinejoin="round"
        filter="url(#glow-effect)" />

  <!-- Center core glowing quantum circle -->
  <circle cx="50" cy="40" r="6" 
          fill="url(#logo-glow)" 
          filter="url(#glow-effect)" />
</svg>